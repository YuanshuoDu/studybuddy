<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>StudyBuddy · 附近活动</title>
  <meta name="theme-color" content="#3B82F6" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
  <!--
      WeChat JSSDK (wx.miniProgram) for parent-page postMessage.
      Only loaded when this page is opened inside a WeChat mini-program
      web-view. In a normal browser tab `wx` is undefined; we guard.
  -->
  <script src="https://res.wx.qq.com/open/js/jweixin-1.3.2.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #F8FAFC;
    }
    #map { width: 100%; height: 100%; }
    .marker {
      width: 36px; height: 36px;
      background: #3B82F6;
      border: 3px solid #FFFFFF;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #FFFFFF;
      font-size: 14px; font-weight: 700;
      transition: transform 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .marker.study { background: #3B82F6; }
    .marker.sport { background: #22C55E; }
    .marker.boardgame { background: #A855F7; }
    .marker.online { background: #EF4444; }
    .marker.other { background: #64748B; }
    .marker:hover { transform: scale(1.15); }
    .marker.user {
      background: #3B82F6;
      box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.25), 0 2px 8px rgba(0, 0, 0, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.25), 0 2px 8px rgba(0, 0, 0, 0.2); }
      50%      { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0.10), 0 2px 8px rgba(0, 0, 0, 0.2); }
    }
    .loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #F8FAFC;
      color: #475569;
      font-size: 14px;
      z-index: 100;
    }
    .legend {
      position: fixed; bottom: 16px; left: 16px;
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 12px 16px;
      font-size: 12px;
      color: #475569;
      z-index: 10;
    }
    .legend-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="loading" id="loading">加载地图中…</div>
  <div class="legend" id="legend" style="display: none;">
    <div class="legend-row"><span class="legend-dot" style="background:#3B82F6;"></span> 自习</div>
    <div class="legend-row"><span class="legend-dot" style="background:#22C55E;"></span> 运动</div>
    <div class="legend-row"><span class="legend-dot" style="background:#A855F7;"></span> 桌游</div>
    <div class="legend-row"><span class="legend-dot" style="background:#EF4444;"></span> 开黑</div>
  </div>

  <script>
    // ---------------------------------------------------------------------
    // Config
    // ---------------------------------------------------------------------
    // Mapbox public token. Override at deploy time via env / build.
    // For local dev, set a personal token from https://account.mapbox.com/.
    const MAPBOX_TOKEN = window.MAPBOX_TOKEN || 'pk.eyJ1Ijoic3R1ZHlidWRkeS1kZXYiLCJhIjoiY2xxeHR1cHJlMDB1dDJqb2F3eHQ5a3hqMSJ9.PLACEHOLDER';

    // The base API URL — same as the miniprogram api/config.ts.
    const API_BASE = (new URLSearchParams(location.search)).get('apiBase')
      || 'https://api.studybuddy.example.com';

    // ---------------------------------------------------------------------
    // State
    // ---------------------------------------------------------------------
    const params = new URLSearchParams(location.search);
    const userLat = parseFloat(params.get('lat') || '0');
    const userLng = parseFloat(params.get('lng') || '0');
    const radiusKm = parseFloat(params.get('radiusKm') || '5');
    const token = params.get('token') || '';

    let map, userMarker;

    // ---------------------------------------------------------------------
    // Init
    // ---------------------------------------------------------------------
    if (!MAPBOX_TOKEN || MAPBOX_TOKEN.endsWith('PLACEHOLDER')) {
      document.getElementById('loading').textContent =
        'Mapbox token 未配置 — 请在部署时设置 window.MAPBOX_TOKEN';
    } else {
      mapboxgl.accessToken = MAPBOX_TOKEN;
      map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [userLng, userLat],
        zoom: 13,
        attributionControl: { compact: true },
      });
      map.addControl(new mapboxgl.NavigationControl({ visualizePitch: false }), 'top-right');
      map.on('load', onMapLoad);
      map.on('error', (e) => {
        console.error('mapbox error', e);
      });
    }

    async function onMapLoad() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('legend').style.display = 'block';

      // User marker (animated pulse)
      const userEl = document.createElement('div');
      userEl.className = 'marker user';
      userEl.textContent = '我';
      userMarker = new mapboxgl.Marker(userEl)
        .setLngLat([userLng, userLat])
        .addTo(map);

      // Center the map on user + a comfortable viewport
      map.fitBounds(
        [
          [userLng - 0.05, userLat - 0.05],
          [userLng + 0.05, userLat + 0.05],
        ],
        { padding: 80, duration: 600 }
      );

      // Fetch activities server-side
      await loadActivities();
    }

    // ---------------------------------------------------------------------
    // Activity fetch + marker render
    // ---------------------------------------------------------------------
    async function loadActivities() {
      const url = new URL(API_BASE + '/api/v1/activities');
      url.searchParams.set('lat', String(userLat));
      url.searchParams.set('lng', String(userLng));
      url.searchParams.set('radiusKm', String(radiusKm));
      url.searchParams.set('pageSize', '200');
      try {
        const res = await fetch(url.toString(), {
          headers: token ? { Authorization: 'Bearer ' + token } : {},
        });
        if (!res.ok) {
          console.error('activities fetch failed', res.status);
          return;
        }
        const body = await res.json();
        const list = (body.data && body.data.data) || [];
        list.forEach((a) => addActivityMarker(a));
      } catch (e) {
        console.error('activities fetch error', e);
      }
    }

    function addActivityMarker(a) {
      const el = document.createElement('div');
      const typeClass = (a.type || 'other').toLowerCase().replace('_', '');
      el.className = 'marker ' + typeClass;
      el.textContent = a.currentCount + '/' + a.maxParticipants;
      el.title = a.title + ' (' + (a.distanceKm != null ? a.distanceKm.toFixed(1) + ' km' : '? km') + ')';
      el.addEventListener('click', () => onMarkerClick(a));
      new mapboxgl.Marker(el)
        .setLngLat([a.locationLng, a.locationLat])
        .setPopup(
          new mapboxgl.Popup({ offset: 24, closeButton: false })
            .setHTML(
              '<div style="font-size:13px;font-weight:600;color:#0F172A;margin-bottom:4px;">' + escapeHtml(a.title) + '</div>' +
              '<div style="font-size:12px;color:#475569;">📍 ' + escapeHtml(a.locationName || '') + '</div>' +
              (a.distanceKm != null
                ? '<div style="font-size:12px;color:#3B82F6;margin-top:4px;">' + a.distanceKm.toFixed(1) + ' km</div>'
                : '')
            )
        )
        .addTo(map);
    }

    function onMarkerClick(a) {
      // Inside a WeChat mini-program web-view: postMessage back to parent.
      if (typeof wx !== 'undefined' && wx.miniProgram && wx.miniProgram.postMessage) {
        wx.miniProgram.postMessage({ data: { activityId: a.id } });
        wx.miniProgram.navigateTo({ url: '/pages/activity/activity?id=' + a.id });
      } else {
        // Plain browser: open detail in a new tab.
        window.open('https://studybuddy.app/activity/' + a.id, '_blank');
      }
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      })[c]);
    }
  </script>
</body>
</html>
