// Pairhub Android settings — Flutter 3.24 / AGP 8.
//
// `flutter.sdk` must point at the local Flutter checkout. CI sets this
// via the env; local dev either symlinks Flutter into a known path or
// relies on the system PATH (the Flutter Gradle plugin finds it).
//
// `loadLocalProperties` reads `android/local.properties` (gitignored)
// for the Android SDK path; CI injects it via env.

pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
