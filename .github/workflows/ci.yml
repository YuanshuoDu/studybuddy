name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: studybuddy
          POSTGRES_PASSWORD: studybuddy
          POSTGRES_DB: studybuddy_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # server/src/lib/env.ts does a Zod parse at module import time. The
    # vitest suite (including health.test.ts) does not set these per-test
    # before importing @/lib/app, so they have to be in the runner env.
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://studybuddy:studybuddy@localhost:5432/studybuddy_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-please-replace-in-prod-min-32-chars-aaaaa
      LOG_LEVEL: warn
    steps:
      - uses: actions/checkout@v4
      - run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'server/pnpm-lock.yaml'
      - name: Install (server)
        working-directory: server
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: server
        run: pnpm lint
      - name: Test
        working-directory: server
        run: pnpm test
