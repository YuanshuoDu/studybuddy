name: flutter-ci

# Flutter CI: flutter analyze + flutter test + flutter build apk --debug
# 与 app/ 脚手架 (PR #14) 配套
# iOS build 暂不在 CI (macOS runner 成本高 + 依赖 CocoaPods 慢)
# — iOS 真机/分发需求明确后再加 ios-build job
# 现状: ios-build job 已加入, 但只跑 `flutter pub get` 校验 iOS 插件
# 解析正常, 不打 IPA (无签名证书 + 无 Apple Developer 凭据).
# 触发方式: workflow_dispatch (手动) — 不在 push / PR 默认跑.

on:
  push:
    branches: [main, develop]
    paths:
      - "app/**"
      - ".github/workflows/flutter-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/**"
      - ".github/workflows/flutter-ci.yml"
  workflow_dispatch:

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: detect app dir
    runs-on: ubuntu-latest
    outputs:
      has-flutter: ${{ steps.check.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - id: check
        run: |
          if [ -f "app/pubspec.yaml" ] || [ -f "app/lib/main.dart" ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "Flutter scaffold detected"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "Flutter scaffold not present - skipping jobs"
          fi

  analyze:
    name: flutter analyze
    needs: detect
    if: needs.detect.outputs.has-flutter == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        working-directory: app
        run: flutter --version

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Generate code (freezed, json_serializable, etc.)
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos

  test:
    name: flutter test
    needs: detect
    if: needs.detect.outputs.has-flutter == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Generate code
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        working-directory: app
        run: flutter test --coverage --reporter=expanded

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: app/coverage/
          if-no-files-found: ignore
          retention-days: 14

  build-apk:
    name: flutter build apk --debug
    needs: [analyze, test]
    if: needs.detect.outputs.has-flutter == 'true'
    runs-on: ubuntu-latest
    # The Android scaffold (app/android/) is not yet committed. M3 W1 will
    # add it via `flutter create -t app --platforms=android .`. Until then
    # we skip the apk build step so the rest of the suite can stay green.
    # Once android/ is added, drop this conditional.
    steps:
      - uses: actions/checkout@v4

      - name: Check Android scaffold
        id: has-android
        working-directory: app
        run: |
          if [ -d "android" ] && [ -f "android/build.gradle" ] || [ -f "android/build.gradle.kts" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "android/ scaffold present"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "android/ scaffold missing - skipping build-apk (M3 W1 work)"
          fi

      - uses: subosito/flutter-action@v2
        if: steps.has-android.outputs.present == 'true'
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - uses: actions/setup-java@v4
        if: steps.has-android.outputs.present == 'true'
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Pub get
        if: steps.has-android.outputs.present == 'true'
        working-directory: app
        run: flutter pub get

      - name: Generate code
        if: steps.has-android.outputs.present == 'true'
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        if: steps.has-android.outputs.present == 'true'
        working-directory: app
        run: flutter build apk --debug

      - name: Check APK size (<50MB for debug)
        if: steps.has-android.outputs.present == 'true'
        working-directory: app
        run: |
          APK=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi
          SIZE=$(stat -c%s "$APK")
          LIMIT=$((50 * 1024 * 1024))
          echo "apk_size_bytes=$SIZE"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "APK too large: $SIZE bytes (limit $LIMIT)"
            exit 1
          fi
          echo "APK size OK"

      - name: Upload APK
        if: always() && steps.has-android.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-debug-apk
          path: app/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: ignore
          retention-days: 7

      - name: Skip notice
        if: steps.has-android.outputs.present != 'true'
        run: |
          echo "### build-apk skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "- Reason: app/android/ scaffold not committed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tracking: M3 W1 Android scaffold task" >> "$GITHUB_STEP_SUMMARY"
          echo "- Action: re-enable the build step once android/ is in place" >> "$GITHUB_STEP_SUMMARY"

  # ==================================================================
  # iOS smoke check — ONLY runs `flutter pub get` on macOS, no build.
  # Verifies the iOS plugin manifest resolves cleanly after a pubspec
  # change. The actual `flutter build ios --release` is deferred until
  # we have signing certs + an Apple Developer account wired into
  # GitHub Actions secrets (see app/ios/README.md §1).
  # ==================================================================
  ios-build:
    name: flutter pub get (iOS smoke)
    needs: detect
    # Only run when:
    #   (a) the Flutter scaffold is present, AND
    #   (b) the workflow was triggered manually (workflow_dispatch).
    # macos-latest is too expensive to run on every push, and we
    # don't have signing certs in CI yet anyway, so this job is a
    # manual smoke check, not part of the default PR gate.
    if: |
      needs.detect.outputs.has-flutter == 'true' &&
      github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        working-directory: app
        run: flutter --version

      - name: Verify iOS plugin manifest resolves
        working-directory: app
        # `flutter pub get` is the lightest possible iOS-aware step.
        # It re-reads pubspec.yaml, resolves the iOS plugin manifest
        # (.flutter-plugins-dependencies), and fails fast if any
        # iOS-specific dependency is missing or version-incompatible.
        # We deliberately do NOT run `pod install` or `flutter build ios`
        # here — those need signing + a release target, which is a
        # separate, future workflow (see app/ios/README.md §6).
        run: |
          set -euo pipefail
          flutter pub get
          echo "==== iOS plugin manifest ===="
          if [ -f .flutter-plugins-dependencies ]; then
            # iOS section is a JSON object; pretty-print if jq is available.
            if command -v jq >/dev/null 2>&1; then
              jq '.ios' .flutter-plugins-dependencies || true
            else
              cat .flutter-plugins-dependencies
            fi
          else
            echo "::warning::.flutter-plugins-dependencies not generated"
            exit 1
          fi
          echo "==== iOS folder present? ===="
          if [ -d ios ]; then
            echo "ios/ present — ${PWD}/ios"
            ls -la ios | head -20
          else
            echo "::warning::ios/ directory not present — run 'flutter create --platforms=ios .' to scaffold it"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### iOS smoke check" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: ${{ github.workflow }} #${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- See app/ios/README.md for the full build + upload playbook." >> "$GITHUB_STEP_SUMMARY"
