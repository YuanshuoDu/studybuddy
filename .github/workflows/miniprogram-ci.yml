name: miniprogram-ci

# 微信小程序 CI: scaffold 校验 + 未来扩展位
# 现状: miniprogram/ 是纯微信原生 (无 package.json / 无 pnpm-lock.yaml),
# 之前的 tsc + miniprogram-ci preview 跑空 — 已替换为轻量结构校验.
# 真正的小程序体验测试由开发者工具本地 + 体验二维码走, CI 只兜底 "仓库里
# 该有的 JSON/TS 文件没被改坏".
# 后续如果 miniprogram/ 引入 npm 依赖, 在 miniprogram/package.json 加
# packageManager 字段后再扩 tsc job 即可.

on:
  push:
    branches: [main, develop]
    paths:
      - "miniprogram/**"
      - ".github/workflows/miniprogram-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "miniprogram/**"
      - ".github/workflows/miniprogram-ci.yml"
  workflow_dispatch:

concurrency:
  group: miniprogram-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: detect miniprogram dir
    runs-on: ubuntu-latest
    outputs:
      has-mini: ${{ steps.check.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f "miniprogram/project.config.json" ] || [ -f "miniprogram/app.json" ] || [ -f "miniprogram/app.ts" ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "miniprogram scaffold detected"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "miniprogram scaffold not present - skipping jobs"
          fi

  validate:
    name: validate miniprogram scaffold
    needs: detect
    if: needs.detect.outputs.has-mini == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate project.config.json
        working-directory: miniprogram
        run: |
          test -f project.config.json || (echo "::error::project.config.json missing" && exit 1)
          node -e "JSON.parse(require('fs').readFileSync('project.config.json','utf8'))" \
            || (echo "::error::project.config.json is not valid JSON" && exit 1)
          echo "project.config.json OK"

      - name: Validate app.json (pages + window)
        working-directory: miniprogram
        run: |
          test -f app.json || (echo "::error::app.json missing" && exit 1)
          node -e "
            const j = JSON.parse(require('fs').readFileSync('app.json','utf8'));
            if (!Array.isArray(j.pages) || j.pages.length === 0) {
              console.error('::error::app.json has no pages'); process.exit(1);
            }
            if (!j.window || typeof j.window !== 'object') {
              console.error('::error::app.json has no window config'); process.exit(1);
            }
            console.log('app.json pages:', j.pages.length);
          " || exit 1
          echo "app.json OK"

      - name: Validate sitemap.json
        working-directory: miniprogram
        run: |
          test -f sitemap.json || (echo "::error::sitemap.json missing" && exit 1)
          node -e "JSON.parse(require('fs').readFileSync('sitemap.json','utf8'))" \
            || (echo "::error::sitemap.json is not valid JSON" && exit 1)
          echo "sitemap.json OK"

      - name: Verify app.ts entry exports App
        working-directory: miniprogram
        run: |
          test -f app.ts || (echo "::error::app.ts missing" && exit 1)
          if ! grep -q "App(" app.ts; then
            echo "::error::app.ts does not call App(...)"
            exit 1
          fi
          echo "app.ts OK"

      - name: Count pages + components + utils
        working-directory: miniprogram
        run: |
          PAGES=$(find pages -name '*.ts' 2>/dev/null | wc -l)
          COMPS=$(find components -name '*.ts' 2>/dev/null | wc -l)
          UTILS=$(find utils -name '*.ts' 2>/dev/null | wc -l)
          echo "pages=$PAGES components=$COMPS utils=$UTILS"
          echo "### miniprogram scaffold" >> "$GITHUB_STEP_SUMMARY"
          echo "- pages: $PAGES" >> "$GITHUB_STEP_SUMMARY"
          echo "- components: $COMPS" >> "$GITHUB_STEP_SUMMARY"
          echo "- utils: $UTILS" >> "$GITHUB_STEP_SUMMARY"
