name: backend-ci

on:
  push:
    branches: [main, develop, feat/**, fix/**, chore/**]
    paths:
      - 'server/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/backend-ci.yml'

# Cancel in-flight runs for the same branch / PR.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: studybuddy
          POSTGRES_PASSWORD: studybuddy
          POSTGRES_DB: studybuddy_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://studybuddy:studybuddy@localhost:5432/studybuddy_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-please-replace-in-prod-min-32-chars-aaaaa
      LOG_LEVEL: warn

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'server/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: server
        run: pnpm prisma generate

      - name: Lint
        working-directory: server
        run: pnpm lint

      - name: Typecheck
        working-directory: server
        run: pnpm typecheck

      - name: Test
        working-directory: server
        run: pnpm test

      - name: Build
        working-directory: server
        run: pnpm build

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: studybuddy-server-dist
          path: server/dist
          retention-days: 7
          if-no-files-found: error

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: studybuddy-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Image size
        run: |
          echo "Image size (bytes):"
          docker image inspect studybuddy-server:ci --format '{{.Size}}'
          SIZE_MB=$(docker image inspect studybuddy-server:ci --format '{{.Size}}' | awk '{print int($1/1048576)}')
          echo "Image size (MB): $SIZE_MB"
          if [ "$SIZE_MB" -gt 300 ]; then
            echo "::error::Image $SIZE_MB MB exceeds 300 MB target"
            exit 1
          fi
